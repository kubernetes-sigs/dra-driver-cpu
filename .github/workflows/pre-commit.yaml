name: pre-commit

on:
  push:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      # remove once either we bump golang to 1.26
      # or https://github.com/golang/go/issues/75031 is fixed
      GOTOOLCHAIN: go1.25.0+auto
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
    - name: Install pre-commit
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit
    - name: Run pre-commit
      run: pre-commit run --all-files
